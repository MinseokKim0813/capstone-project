<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Instructor Quiz Builder</title>
    <link rel="stylesheet" href="instructor.css" />
    <script src="https://unpkg.com/mathlive"></script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 p-8">
    <!-- Centered modal for Add Tool input -->
    <div id="add-tool-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50" aria-hidden="true">
      <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full mx-4">
        <label for="add-tool-input" class="block text-sm font-medium text-gray-700 mb-2">Enter LaTeX symbol</label>
        <input type="text" id="add-tool-input" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-4" placeholder="e.g. \neg, \alpha, \rightarrow">
        <div class="flex justify-end gap-2">
          <button type="button" id="add-tool-cancel" class="px-4 py-2 text-gray-700 bg-gray-200 rounded-md hover:bg-gray-300">Cancel</button>
          <button type="button" id="add-tool-submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700">Add</button>
        </div>
      </div>
    </div>

    <div class="max-w-4xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">
          MathTextor Problem Builder
        </h1>
        <button
          id="download-btn"
          class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition-colors"
        >
          Download Problems
        </button>
      </div>

      <div id="quiz-builder-area" class="space-y-8"></div>

      <div class="mt-8 text-center">
        <button
          id="add-quiz-btn"
          class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-transform transform hover:scale-105"
        >
          + Add New Quiz
        </button>
      </div>
    </div>

    <script type="module" src="instructor.js"></script>
  </body>
</html>
